<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AxiQuant AI Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header span { font-size: 13px; color: #94a3b8; }
    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Domain selector */
    .domain-bar {
      background: #1e293b;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    .domain-bar label { font-size: 13px; color: #94a3b8; }
    .domain-bar select {
      background: #334155;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    /* Chat area */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 75%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .message.user {
      background: #1e40af;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .message.assistant {
      background: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #334155;
    }
    .message.thinking {
      background: #1e293b;
      align-self: flex-start;
      color: #94a3b8;
      font-style: italic;
      border: 1px solid #334155;
    }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }
    .welcome h2 { font-size: 24px; color: white; margin-bottom: 8px; }
    .welcome p { font-size: 14px; margin-bottom: 24px; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .suggestion-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #cbd5e1;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover { background: #334155; color: white; }

    /* Input area */
    .input-area {
      padding: 16px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: #334155;
      border: 1px solid #475569;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
    }
    #user-input:focus { border-color: #1e40af; }
    #user-input::placeholder { color: #64748b; }
    
    #send-btn {
      background: #1e40af;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="status-dot"></div>
    <h1>🤖 AxiQuant AI Agent</h1>
    <span>Enterprise AI Assistant</span>
  </div>

  <!-- Domain selector -->
  <div class="domain-bar">
    <label>Industry Domain:</label>
    <select id="domain-select">
      <option value="retail">🛒 Retail</option>
      <option value="pharma">💊 Pharma</option>
      <option value="manufacturing">🏭 Manufacturing</option>
      <option value="real_estate">🏠 Real Estate</option>
      <option value="automotive">🚗 Automotive</option>
      <option value="energy">⚡ Energy</option>
    </select>
  </div>

  <!-- Messages -->
  <div id="messages">
    <div class="welcome" id="welcome">
      <h2>Welcome to AxiQuant AI</h2>
      <p>Your enterprise AI assistant. Ask anything about your business.</p>
      <div class="suggestions">
        <button class="suggestion-btn" onclick="askSuggestion(this)">Design an ETL pipeline for sales data</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">How to predict next year's budget?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">What KPIs should I track?</button>
        <button class="suggestion-btn" onclick="askSuggestion(this)">Optimize supply chain management</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <textarea id="user-input" placeholder="Ask anything about your business..." rows="1"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send ➤</button>
  </div>

<script>
  const API_URL = "https://axiquant-ai-agent.onrender.com/chat";

  function askSuggestion(btn) {
    document.getElementById('user-input').value = btn.innerText;
    sendMessage();
  }

  async function sendMessage() {
    const input = document.getElementById('user-input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('send-btn');
    const domain = document.getElementById('domain-select').value;
    const text = input.value.trim();
    
    if (!text) return;

    // Hide welcome screen
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.style.display = 'none';

    // Add user message
    messages.innerHTML += `<div class="message user">${escapeHtml(text)}</div>`;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    // Add thinking indicator
    const thinkingId = 'thinking-' + Date.now();
    messages.innerHTML += `<div class="message thinking" id="${thinkingId}">🤔 Analyzing your question...</div>`;
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, domain: domain })
      });
      const data = await res.json();
      document.getElementById(thinkingId).remove();
      messages.innerHTML += `<div class="message assistant">${escapeHtml(data.response)}</div>`;
    } catch (e) {
      document.getElementById(thinkingId).remove();
      messages.innerHTML += `<div class="message assistant">⚠️ Error connecting to AI. Please try again.</div>`;
    }

    messages.scrollTop = messages.scrollHeight;
    sendBtn.disabled = false;
    input.focus();
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/\n/g, "<br>");
  }

  // Auto-resize textarea
  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
