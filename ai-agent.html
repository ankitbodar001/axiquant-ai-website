<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AxiQuant AI Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #1e293b;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    .header h1 { font-size: 20px; font-weight: 700; }
    .header span { font-size: 13px; color: #94a3b8; }
    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .domain-bar {
      background: #1e293b;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #334155;
    }
    .domain-bar label { font-size: 13px; color: #94a3b8; }
    .domain-bar select {
      background: #334155;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.6;
    }
    .message.user {
      background: #1e40af;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
      white-space: pre-wrap;
    }
    .message.assistant {
      background: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border: 1px solid #334155;
      max-width: 92%;
    }
    .message.thinking {
      background: #1e293b;
      align-self: flex-start;
      color: #94a3b8;
      font-style: italic;
      border: 1px solid #334155;
    }

    .welcome {
      text-align: center;
      padding: 40px 20px;
      color: #94a3b8;
    }
    .welcome h2 { font-size: 24px; color: white; margin-bottom: 8px; }
    .welcome p { font-size: 14px; margin-bottom: 24px; }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .suggestion-btn {
      background: #1e293b;
      border: 1px solid #334155;
      color: #cbd5e1;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .suggestion-btn:hover { background: #334155; color: white; }

    .input-area {
      padding: 16px 24px;
      background: #1e293b;
      border-top: 1px solid #334155;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      background: #334155;
      border: 1px solid #475569;
      color: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      resize: none;
      outline: none;
      min-height: 44px;
      max-height: 120px;
      font-family: inherit;
    }
    #user-input:focus { border-color: #1e40af; }
    #user-input::placeholder { color: #64748b; }
    
    #send-btn {
      background: #1e40af;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover { background: #1d4ed8; }
    #send-btn:disabled { background: #334155; cursor: not-allowed; }

    /* ── Markdown styles ── */
    .message.assistant h2 {
      color: #93c5fd;
      font-size: 1.1em;
      margin: 16px 0 8px;
      font-weight: 700;
      border-bottom: 1px solid #334155;
      padding-bottom: 4px;
    }
    .message.assistant h3 {
      color: #a5b4fc;
      font-size: 1em;
      margin: 12px 0 6px;
      font-weight: 600;
    }
    /* Clean compact table */
    .message.assistant table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
      font-size: 13px;
      table-layout: auto;
    }
    .message.assistant thead tr {
      background: #273549;
    }
    .message.assistant th {
      padding: 8px 12px;
      border: 1px solid #475569;
      color: #93c5fd;
      font-weight: 600;
      text-align: left;
    }
    .message.assistant td {
      padding: 7px 12px;
      border: 1px solid #334155;
      color: #cbd5e1;
      vertical-align: top;
    }
    .message.assistant tbody tr:nth-child(even) {
      background: #1a2535;
    }
    .message.assistant tbody tr:hover {
      background: #223044;
    }
    .message.assistant .md-list-item {
      margin: 3px 0;
      padding: 3px 0 3px 16px;
      color: #cbd5e1;
    }
    .message.assistant .md-numbered {
      margin: 6px 0;
      padding: 6px 12px;
      border-left: 3px solid #3b82f6;
      background: #162032;
      border-radius: 0 6px 6px 0;
    }
    .message.assistant code {
      background: #334155;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      color: #7dd3fc;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="status-dot"></div>
    <h1>🤖 AxiQuant AI Agent</h1>
    <span>Enterprise AI Assistant</span>
  </div>

  <div class="domain-bar">
    <label>Industry Domain:</label>
    <select id="domain-select" onchange="updateSuggestions(this.value)">
      <option value="retail">🛒 Retail</option>
      <option value="pharma">💊 Pharma</option>
      <option value="manufacturing">🏭 Manufacturing</option>
      <option value="real_estate">🏠 Real Estate</option>
      <option value="automotive">🚗 Automotive</option>
      <option value="energy">⚡ Energy</option>
    </select>
  </div>

  <div id="messages">
    <div class="welcome" id="welcome">
      <h2>Welcome to AxiQuant AI</h2>
      <p>Your enterprise AI assistant. Ask anything about your business.</p>
      <div class="suggestions" id="suggestions-container"></div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="user-input" placeholder="Ask anything about your business..." rows="1"
      onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }"></textarea>
    <button id="send-btn" onclick="sendMessage()">Send ➤</button>
  </div>

<script>
  const API_URL = "https://axiquant-ai-agent.onrender.com/chat";

  const DOMAIN_EXAMPLES = {
    retail: [
      "Design an ETL pipeline for sales data on Azure",
      "How do I predict next year's inventory budget?",
      "What KPIs should I track for retail performance?",
      "How to reduce cart abandonment rate?",
      "Analyze customer lifetime value and retention strategies"
    ],
    pharma: [
      "How do I track drug development pipeline stages?",
      "What are the key FDA compliance requirements for drug approval?",
      "How to optimize clinical trial management and reporting?",
      "Design a pharmacovigilance adverse event tracking system",
      "What metrics should I monitor for R&D pipeline performance?"
    ],
    manufacturing: [
      "How do I implement predictive maintenance for equipment?",
      "Design a production planning and scheduling system",
      "How to reduce defect rates and improve OEE?",
      "What is the best approach for supply chain optimization?",
      "How to set up real-time quality control monitoring?"
    ],
    real_estate: [
      "How do I build a property valuation model?",
      "What KPIs should I track for real estate portfolio performance?",
      "How to automate lead qualification for property buyers?",
      "Analyze cap rate and ROI for investment properties",
      "How to forecast rental market trends using historical data?"
    ],
    automotive: [
      "How do I optimize vehicle inventory management?",
      "Design a customer lead scoring system for car sales",
      "What metrics should I track for service department performance?",
      "How to forecast parts demand and reduce stockouts?",
      "Analyze customer satisfaction and retention strategies"
    ],
    energy: [
      "How do I build an energy demand forecasting model?",
      "Design a grid monitoring and anomaly detection system",
      "What KPIs should I track for renewable energy performance?",
      "How to optimize energy distribution and reduce losses?",
      "Analyze customer usage patterns to improve efficiency"
    ]
  };

  function updateSuggestions(domain) {
    const container = document.getElementById('suggestions-container');
    const examples = DOMAIN_EXAMPLES[domain] || DOMAIN_EXAMPLES['retail'];
    container.innerHTML = examples.map(q =>
      `<button class="suggestion-btn" onclick="askSuggestion(this)">${q}</button>`
    ).join('');
  }

  function askSuggestion(btn) {
    document.getElementById('user-input').value = btn.innerText;
    sendMessage();
  }

  // ── Markdown renderer ─────────────────────────────────────────────────────
  function renderMarkdown(raw) {
    const lines = raw.split('\n');
    let html = '';
    let inTable = false;
    let tableHtml = '';
    let isFirstTableRow = true;

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];

      // ── Table rows ──
      if (/^\|.+\|/.test(line)) {
        // Skip separator rows like |---|---|
        if (/^\|[\s\-:|]+\|/.test(line)) {
          isFirstTableRow = false; // next rows are tbody
          continue;
        }
        const cells = line.split('|').slice(1, -1).map(c =>
          processInline(c.trim())
        );
        if (isFirstTableRow) {
          if (!inTable) {
            tableHtml = '<table><thead>';
            inTable = true;
          }
          tableHtml += '<tr>' + cells.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
          isFirstTableRow = false;
        } else {
          tableHtml += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
        }
        continue;
      } else if (inTable) {
        // Close table when non-table line encountered
        tableHtml += '</tbody></table>';
        html += tableHtml;
        tableHtml = '';
        inTable = false;
        isFirstTableRow = true;
      }

      // ── Headers ──
      if (/^### (.+)/.test(line)) {
        html += `<h3>${processInline(line.replace(/^### /, ''))}</h3>`;
      } else if (/^## (.+)/.test(line)) {
        html += `<h2>${processInline(line.replace(/^## /, ''))}</h2>`;
      } else if (/^# (.+)/.test(line)) {
        html += `<h2>${processInline(line.replace(/^# /, ''))}</h2>`;

      // ── Numbered list with bold title ──
      } else if (/^\d+\.\s+\*\*(.+?)\*\*/.test(line)) {
        const match = line.match(/^\d+\.\s+\*\*(.+?)\*\*:?\s*(.*)/);
        if (match) {
          html += `<div class="md-numbered"><strong style="color:#93c5fd;">${match[1]}</strong>`;
          if (match[2]) html += `<span style="color:#cbd5e1;"> ${processInline(match[2])}</span>`;
          html += `</div>`;
        }

      // ── Plain numbered list ──
      } else if (/^\d+\.\s+/.test(line)) {
        html += `<div class="md-list-item">• ${processInline(line.replace(/^\d+\.\s+/, ''))}</div>`;

      // ── Bullet points ──
      } else if (/^[-*]\s+/.test(line)) {
        html += `<div class="md-list-item">• ${processInline(line.replace(/^[-*]\s+/, ''))}</div>`;

      // ── Empty line ──
      } else if (line.trim() === '') {
        html += '<br>';

      // ── Normal paragraph ──
      } else {
        html += `<p style="margin:4px 0;">${processInline(line)}</p>`;
      }
    }

    // Close any unclosed table
    if (inTable) {
      tableHtml += '</tbody></table>';
      html += tableHtml;
    }

    return html;
  }

  // Process inline markdown (bold, italic, code)
  function processInline(text) {
    // Escape HTML
    text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong style="color:#e2e8f0;">$1</strong>');
    // Italic
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Inline code
    text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
    return text;
  }

  // ── Send message ──────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById('user-input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('send-btn');
    const domain = document.getElementById('domain-select').value;
    const text = input.value.trim();

    if (!text) return;

    const welcome = document.getElementById('welcome');
    if (welcome) welcome.style.display = 'none';

    messages.innerHTML += `<div class="message user">${text}</div>`;
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const thinkingId = 'thinking-' + Date.now();
    messages.innerHTML += `<div class="message thinking" id="${thinkingId}">🤔 Analyzing your question...</div>`;
    messages.scrollTop = messages.scrollHeight;

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, domain: domain })
      });
      const data = await res.json();
      document.getElementById(thinkingId).remove();
      const formatted = renderMarkdown(data.response);
      messages.innerHTML += `<div class="message assistant">${formatted}</div>`;
    } catch (e) {
      document.getElementById(thinkingId).remove();
      messages.innerHTML += `<div class="message assistant">⚠️ Error connecting to AI. Please try again.</div>`;
    }

    messages.scrollTop = messages.scrollHeight;
    sendBtn.disabled = false;
    input.focus();
  }

  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });

  document.addEventListener('DOMContentLoaded', function() {
    updateSuggestions('retail');
  });
</script>
</body>
</html>
